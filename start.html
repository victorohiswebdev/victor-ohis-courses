<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>START | Skill to Wealth Masterclass</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Montserrat", "sans-serif"] },
            animation: {
              "pulse-slow": "pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite",
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-gray-950 text-gray-100 font-sans h-screen w-screen overflow-hidden relative selection:bg-cyan-500 selection:text-white"
  >
    <div class="absolute inset-0 z-0">
      <img
        src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=2000&auto=format&fit=crop"
        alt="Abstract Digital Design"
        class="w-full h-full object-cover"
      />
      <div class="absolute inset-0 bg-gray-950/90 backdrop-blur-sm"></div>
      <div
        class="absolute inset-0 bg-gradient-to-b from-gray-950/10 via-gray-950/80 to-gray-950"
      ></div>
    </div>

    <main
      class="h-full flex flex-col items-center justify-center text-center px-6 relative z-10"
    >
      <div
        class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-gray-900/80 border border-gray-700 text-cyan-400 text-sm font-bold tracking-widest uppercase mb-12 shadow-lg backdrop-blur-sm"
      >
        A Digital-Preneur Masterclass
      </div>

      <h1
        class="text-7xl md:text-9xl font-black text-white drop-shadow-[0_0_30px_rgba(34,211,238,0.2)] leading-tight mb-4 tracking-tighter"
      >
        Skill to
        <span
          class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500"
          >Wealth</span
        >
      </h1>

      <h2
        class="text-3xl md:text-4xl font-bold text-gray-300 mb-20 tracking-wide"
      >
        The AI Design Masterclass.
      </h2>

      <p
        class="text-lg md:text-xl text-gray-500 font-medium mb-16 tracking-wide"
      >
        Instructed by <strong class="text-gray-200">Victor Ohis</strong>
      </p>

      <a
        href="cover.html"
        class="group relative flex items-center justify-center h-28 w-28 bg-gray-900 border-2 border-cyan-900 rounded-full hover:border-cyan-400 hover:bg-gray-800 transition-all duration-500 shadow-[0_0_20px_rgba(34,211,238,0.1)] hover:shadow-[0_0_50px_rgba(34,211,238,0.5)] transform hover:scale-105 hover:-translate-y-1"
      >
        <div
          class="absolute inset-0 rounded-full bg-cyan-500 opacity-20 animate-pulse-slow"
        ></div>

        <svg
          class="w-16 h-16 text-cyan-400 group-hover:text-cyan-300 transition-colors"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M14 5l7 7m0 0l-7 7m7-7H3"
          ></path>
        </svg>

        <span
          class="absolute -bottom-8 text-xs font-bold uppercase text-cyan-400 tracking-widest opacity-0 group-hover:opacity-100 transition-opacity"
          >Enter Masterclass</span
        >
      </a>
    </main>
  </body>
</html>
