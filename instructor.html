<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instructor Profile | Victor Ohis</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: { fontFamily: { sans: ["Montserrat", "sans-serif"] } },
        },
      };
    </script>
    <style>
      .glass-card {
        background: rgba(17, 24, 39, 0.4);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body class="bg-gray-950 text-gray-100 font-sans min-h-screen selection:bg-green-500 selection:text-gray-900 overflow-y-auto hide-scrollbar">
    
    <!-- Background Glows -->
    <div class="fixed top-[-10%] left-[-10%] w-[600px] h-[600px] bg-green-900 rounded-full mix-blend-multiply filter blur-[150px] opacity-10 z-0 pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[600px] h-[600px] bg-blue-900 rounded-full mix-blend-multiply filter blur-[150px] opacity-10 z-0 pointer-events-none"></div>

    <main class="w-full max-w-5xl mx-auto px-6 py-20 z-10 relative">
      <!-- Back to Dashboard -->
      <a href="index.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-green-400 font-bold mb-12 transition-colors group">
        <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        Back to Dashboard
      </a>

      <!-- Profile Header -->
      <div class="flex flex-col md:flex-row gap-12 items-center mb-20">
        <div class="w-64 h-64 md:w-80 md:h-80 rounded-[3rem] overflow-hidden border-4 border-gray-800 shadow-2xl relative group">
          <div class="absolute inset-0 bg-gradient-to-t from-gray-950/60 to-transparent"></div>
          <img id="inst-avatar" src="" alt="Instructor" class="w-full h-full object-cover">
          <div class="absolute bottom-6 left-6 right-6 text-center">
            <span class="bg-green-500 text-gray-950 text-xs font-black px-3 py-1 rounded-full uppercase tracking-widest">Active Mentor</span>
          </div>
        </div>
        
        <div class="flex-grow text-center md:text-left">
          <h1 id="inst-name" class="text-5xl md:text-7xl font-black text-white mb-4"></h1>
          <p id="inst-role" class="text-2xl font-bold text-green-400 mb-6"></p>
          <div class="flex flex-wrap justify-center md:justify-start gap-4 mb-8">
            <div id="inst-location" class="px-4 py-2 bg-gray-900/60 border border-gray-800 rounded-full text-gray-400 text-sm font-bold flex items-center gap-2">
              📍 <span></span>
            </div>
            <div id="inst-status" class="px-4 py-2 bg-gray-900/60 border border-gray-800 rounded-full text-green-400 text-sm font-bold flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Online Now
            </div>
          </div>
          
          <!-- Social Icons -->
          <div id="inst-socials" class="flex justify-center md:justify-start gap-4">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>

      <!-- Bio & Stats -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-20">
        <div class="md:col-span-2 glass-card p-10 rounded-[2.5rem] border border-gray-800">
          <h2 class="text-3xl font-black text-white mb-6 tracking-tight">The Vision</h2>
          <p id="inst-bio" class="text-xl text-gray-400 leading-relaxed font-medium mb-8 italic"></p>
          <div class="bg-gray-950/40 p-8 rounded-3xl border-l-4 border-green-500">
            <p id="inst-mission" class="text-white font-bold text-lg leading-relaxed"></p>
          </div>
        </div>
        
        <div class="space-y-6">
          <h2 class="text-2xl font-black text-white px-4">Track Record</h2>
          <div id="inst-stats" class="space-y-4">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="mt-32 text-center border-t border-gray-900 pt-12">
        <p class="text-gray-500 font-semibold tracking-wide">&copy; 2026 Livefree Academy. Professional Education Division.</p>
      </footer>
    </main>

    <script src="instructor_config.js"></script>
    <script>
      function initProfile() {
        const c = INSTRUCTOR_CONFIG;
        
        // Basic Info
        document.getElementById('inst-name').innerText = c.name;
        document.getElementById('inst-role').innerText = c.role;
        document.getElementById('inst-avatar').src = c.avatar;
        document.getElementById('inst-location').querySelector('span').innerText = c.location;
        document.getElementById('inst-bio').innerText = c.bio;
        document.getElementById('inst-mission').innerText = c.mission;

        // Stats
        document.getElementById('inst-stats').innerHTML = c.stats.map(s => `
          <div class="glass-card p-6 rounded-3xl border border-gray-800 text-center">
            <div class="text-3xl font-black text-white mb-1">${s.value}</div>
            <div class="text-xs font-bold text-gray-500 uppercase tracking-widest">${s.label}</div>
          </div>
        `).join('');

        // Socials
        document.getElementById('inst-socials').innerHTML = c.socials.map(s => `
          <a href="${s.url}" target="_blank" class="w-12 h-12 glass-card flex items-center justify-center rounded-2xl border border-gray-800 hover:border-green-500 hover:bg-green-500/10 transition-all text-2xl" title="${s.platform}">
            ${s.icon}
          </a>
        `).join('');
      }

      initProfile();
    </script>
  </body>
</html>
